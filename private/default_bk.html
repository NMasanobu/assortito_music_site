<html lang="ja">
<head>

  <title>{{ page.title }} | {{ site.title }}</title>

  <meta
    name="description"
    content="{{ page.description | default: site.description }}"
  >

  <link
    rel="stylesheet"
    href="{{ '/assets/css/style.css' | relative_url }}"
  >
</head>
<body>

<header>
  <h1>
    <a href="{{ '/' | relative_url }}">
      {{ site.title }}
    </a>
  </h1>
</header>

<main>
  {{ content }}
</main>

<footer>
  <p>© Assortito</p>
</footer>

</body>
</html>
